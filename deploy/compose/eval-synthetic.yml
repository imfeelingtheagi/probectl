# probectl — EVALUATION overlay: add SYNTHETIC (canary) probes to eval.yml.
# ============================================================================
# Layer this ON TOP OF eval.yml to also exercise Path 1 (active probes), which —
# unlike the eBPF fixture path — needs agent enrollment + mTLS:
#
#     docker compose -f deploy/compose/eval.yml -f deploy/compose/eval-synthetic.yml up --build -d
#     # 1) mint a one-time join token:
#     docker compose -f deploy/compose/eval.yml -f deploy/compose/eval-synthetic.yml \
#         exec control /usr/local/bin/app enroll-token \
#         -tenant 00000000-0000-0000-0000-000000000001 -name laptop
#     # 2) hand the token to the canary; it self-enrolls on boot, then probes:
#     PROBECTL_JOIN_TOKEN=pjt_xxx docker compose -f deploy/compose/eval.yml \
#         -f deploy/compose/eval-synthetic.yml --profile synthetic up --build -d canary
#     # 3) read its synthetic results:
#     docker compose -f deploy/compose/eval.yml --profile tools run --rm \
#         -e URL=/v1/results/latest viewer
#
# This overlay provisions the agent CA and turns ON the control plane's agent
# gRPC listener. It is the most intricate part of the eval and is AUTHORED-UNRUN
# (no Docker in the authoring env) — give it one real pass. The fully
# ground-truthed canary path that needs none of this overlay is the "from
# source" walkthrough in docs/getting-started.md.
#
# Trust wiring (no enroll-first chicken-and-egg):
#   agent-ca-init  -> creates the agent CA in Postgres (it SIGNS agent SVIDs),
#                     sealing the intermediate key with the deployment envelope.
#   ca-export      -> writes the agent CA's PUBLIC bundle to /certs/agent-ca.crt
#                     (`probectl-control agent-ca export` — public certs only,
#                     no key, no envelope) for the gRPC client-CA pool.
# The control plane verifies AGENTS with that agent CA (PROBECTL_AGENT_TLS_CA_FILE);
# each agent verifies the SERVER with the quickstart server CA (/certs/ca.crt).
# Two CAs, two jobs — see docs/getting-started.md.
#
# Envelope sharing: agent-ca-init SEALS the intermediate key and `control`
# UNSEALS it, so both must use the SAME deployment envelope key. They share it
# via the `controldata` volume (where the control plane persists the key file).
# ============================================================================

services:
  # ---- one-shots that provision the agent CA before `control` starts --------
  # Explicit migrate first, so `agent-ca init` finds the agent_ca table (0041).
  migrate:
    # Reuses the probectl-control-eval:dev image that eval.yml builds (eval.yml is
    # always in the -f set with this overlay), so no build stanza is needed here.
    # (YAML anchors do not cross -f files, so eval.yml's build anchor can't be
    # referenced from this document.)
    image: probectl-control-eval:dev
    command: ["migrate"]
    environment:
      PROBECTL_DATABASE_URL: postgres://probectl:probectl@postgres:5432/probectl?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    networks: [probectl]
    restart: "no"

  agent-ca-init:
    image: probectl-control-eval:dev
    command: ["agent-ca", "init"]
    environment:
      PROBECTL_DATABASE_URL: postgres://probectl:probectl@postgres:5432/probectl?sslmode=disable
    depends_on:
      migrate: { condition: service_completed_successfully }
    volumes:
      # Share the deployment envelope key with `control`: agent-ca-init seals the
      # intermediate key with it, and control must unseal with the SAME key.
      - controldata:/var/lib/probectl
    networks: [probectl]
    restart: "no"

  # Write the agent CA's PUBLIC bundle (root + intermediate) into the shared
  # certs volume via the `agent-ca export` subcommand — public certs only, so it
  # needs no envelope key. Replaces the old brittle psql SELECT.
  ca-export:
    image: probectl-control-eval:dev
    command: ["agent-ca", "export", "/certs/agent-ca.crt"]
    environment:
      PROBECTL_DATABASE_URL: postgres://probectl:probectl@postgres:5432/probectl?sslmode=disable
    depends_on:
      agent-ca-init: { condition: service_completed_successfully }
    volumes:
      - certs:/certs
    networks: [probectl]
    restart: "no"

  # ---- turn ON the agent gRPC listener (merges into eval.yml's `control`) ----
  # The four PROBECTL_AGENT_* values are all-or-nothing (AgentTransportEnabled).
  # gRPC binds loopback (127.0.0.1:9443) — the canary reaches it by sharing this
  # container's network namespace. control now also waits for the CA file.
  control:
    environment:
      PROBECTL_AGENT_GRPC_ADDR: "127.0.0.1:9443"
      PROBECTL_AGENT_TLS_CERT_FILE: /certs/tls.crt        # server presents the quickstart cert
      PROBECTL_AGENT_TLS_KEY_FILE: /certs/tls.key
      PROBECTL_AGENT_TLS_CA_FILE: /certs/agent-ca.crt     # verifies agent SVIDs (from ca-export)
    depends_on:
      ca-export: { condition: service_completed_successfully }

  # ---- the canary: self-enrolls on boot from the join token, then probes ----
  # Shares the control plane's netns to reach both the loopback HTTPS API (for
  # first-boot enrollment) and the loopback gRPC listener (to stream results).
  # `synthetic` profile keeps it off the default `up`. One service, no separate
  # enroll step — enroll-on-boot redeems the token, writes the identity, runs.
  canary:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        COMPONENT: probectl-agent   # portable canary build (no tags)
    image: probectl-agent-eval:dev
    profiles: ["synthetic"]
    network_mode: "service:control"
    depends_on: [control]
    environment:
      # First-boot enrollment: redeemed once, then the identity persists on the
      # `identity` volume so a restart does NOT re-enroll (idempotent). A reused
      # (already-consumed) token fails closed with a clear error.
      PROBECTL_AGENT_JOIN_TOKEN: "${PROBECTL_JOIN_TOKEN:?set PROBECTL_JOIN_TOKEN to the pjt_ token from enroll-token}"
    volumes:
      - identity:/identity
      - certs:/certs:ro
      - ./eval-agent.yml:/etc/probectl/agent.yml:ro
    command: ["-config", "/etc/probectl/agent.yml"]
    restart: unless-stopped

volumes:
  identity: {}
