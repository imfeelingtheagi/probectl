# netctl — shipped all-in-one deployment (HTTPS-by-default).
#
# Brings up the control plane behind TLS with a Postgres backing store. The API
# is exposed ONLY over HTTPS (port 8443) — there is no plaintext listener
# (CLAUDE.md §7 guardrail 12). A self-signed certificate is generated on first
# boot by `netctl-control gen-cert` (the `certgen` one-shot) for an immediate
# quickstart; production operators replace it with a CA-issued certificate by
# mounting their own /certs and pointing NETCTL_TLS_HOSTS at real hostnames.
#
#   cp deploy/compose/.env.example deploy/compose/.env   # then edit
#   docker compose -f deploy/compose/netctl.yml up -d
#   curl --cacert ./certs/ca.crt https://localhost:8443/readyz   # see docs/install.md
#
# This is the production-shaped stack. The local *dependency* stack for developing
# the control plane from source is deploy/compose/dev.yml.
name: netctl

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: netctl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netctl}
      POSTGRES_DB: netctl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netctl -d netctl"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s
    networks: [netctl]
    # No host port: only the control plane reaches Postgres (in-network).
    restart: unless-stopped

  # One-shot: generate a self-signed TLS cert into the shared `certs` volume if
  # one is not already present. Idempotent — re-running leaves an existing cert.
  certgen:
    image: ${NETCTL_IMAGE:-ghcr.io/imfeelingtheagi/netctl-control:latest}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'test -f /certs/tls.crt || /usr/local/bin/app gen-cert /certs'
    environment:
      NETCTL_CERT_HOSTS: ${NETCTL_TLS_HOSTS:-localhost,127.0.0.1}
    volumes:
      - certs:/certs
    networks: [netctl]
    restart: "no"

  control:
    image: ${NETCTL_IMAGE:-ghcr.io/imfeelingtheagi/netctl-control:latest}
    depends_on:
      postgres:
        condition: service_healthy
      certgen:
        condition: service_completed_successfully
    environment:
      # HTTPS only. TLS cert/key make the listener serve TLS; HSTS is on.
      NETCTL_HTTP_ADDR: ":8443"
      NETCTL_TLS_CERT_FILE: /certs/tls.crt
      NETCTL_TLS_KEY_FILE: /certs/tls.key
      NETCTL_HSTS_ENABLED: "true"
      NETCTL_DATABASE_URL: postgres://netctl:${POSTGRES_PASSWORD:-netctl}@postgres:5432/netctl?sslmode=disable
      NETCTL_MIGRATE_ON_BOOT: "true"
      # Envelope KEK for at-rest secret encryption. Generate: openssl rand -base64 32
      NETCTL_ENVELOPE_KEY: ${NETCTL_ENVELOPE_KEY:-}
      # "dev" = all-access (quickstart only). Production: "session" + NETCTL_OIDC_*.
      NETCTL_AUTH_MODE: ${NETCTL_AUTH_MODE:-dev}
      NETCTL_OIDC_ISSUER: ${NETCTL_OIDC_ISSUER:-}
      NETCTL_OIDC_CLIENT_ID: ${NETCTL_OIDC_CLIENT_ID:-}
      NETCTL_OIDC_CLIENT_SECRET: ${NETCTL_OIDC_CLIENT_SECRET:-}
      NETCTL_OIDC_REDIRECT_URL: ${NETCTL_OIDC_REDIRECT_URL:-}
      NETCTL_SECURITY_CONTACT: ${NETCTL_SECURITY_CONTACT:-}
      NETCTL_LOG_FORMAT: json
    ports:
      - "8443:8443" # HTTPS ONLY — no plaintext API port is published.
    volumes:
      - certs:/certs:ro
    networks: [netctl]
    restart: unless-stopped

volumes:
  pgdata: {}
  certs: {}

networks:
  netctl: {}
