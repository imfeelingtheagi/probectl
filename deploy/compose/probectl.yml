# probectl — shipped all-in-one deployment (HTTPS-by-default).
#
# Brings up the control plane behind TLS with a Postgres backing store. The API
# is exposed ONLY over HTTPS (port 8443) — there is no plaintext listener
# (CLAUDE.md §7 guardrail 12). A self-signed certificate is generated on first
# boot by `probectl-control gen-cert` (the `certgen` one-shot) for an immediate
# quickstart; production operators replace it with a CA-issued certificate by
# mounting their own /certs and pointing PROBECTL_TLS_HOSTS at real hostnames.
#
#   cp deploy/compose/.env.example deploy/compose/.env   # then edit
#   docker compose -f deploy/compose/probectl.yml up -d
#   curl --cacert ./certs/ca.crt https://localhost:8443/readyz   # see docs/install.md
#
# This is the production-shaped stack. The local *dependency* stack for developing
# the control plane from source is deploy/compose/dev.yml.
name: probectl

services:
  postgres:
    image: postgres:16@sha256:4b7183ac05f8ef417db21fd72d71047a4238340c261d3cc3ddb6d579ab5071ae # digest-pinned (U-061)
    depends_on:
      certgen:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: probectl
      # SEC-006: REQUIRED — compose refuses to start without an operator-set
      # password (no shipped default). Set it in .env (openssl rand -base64 24).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (no default ships — SEC-006)}
      POSTGRES_DB: probectl
    # TLS on the Postgres listener (U-039): reuse the certgen-provisioned cert
    # (sslmode=require encrypts without verifying, so the self-signed quickstart
    # cert works; operators with a CA-issued cert get it automatically). The
    # key is install'ed postgres-owned 0600 as the server requires.
    command: >
      bash -c "install -o postgres -g postgres -m 600 /certs/tls.key /var/lib/postgresql/server.key
      && install -o postgres -g postgres -m 644 /certs/tls.crt /var/lib/postgresql/server.crt
      && exec docker-entrypoint.sh postgres -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/server.crt
      -c ssl_key_file=/var/lib/postgresql/server.key"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U probectl -d probectl"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s
    networks: [probectl]
    # No host port: only the control plane reaches Postgres (in-network).
    restart: unless-stopped

  # One-shot: generate a self-signed TLS cert into the shared `certs` volume if
  # one is not already present. Idempotent — re-running leaves an existing cert.
  certgen:
    # SUPPLY-001: the shipped default is a PINNED release, never :latest.
    # Dependabot (deploy/compose docker ecosystem) bumps the pin; operators
    # should digest-pin on install — see docs/dependency-policy.md:
    #   docker inspect --format='{{index .RepoDigests 0}}' <image>
    image: ${PROBECTL_IMAGE:-ghcr.io/imfeelingtheagi/probectl-control:v0.4.0}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'test -f /certs/tls.crt || /usr/local/bin/app gen-cert /certs'
    environment:
      PROBECTL_CERT_HOSTS: ${PROBECTL_TLS_HOSTS:-localhost,127.0.0.1}
    volumes:
      - certs:/certs
    networks: [probectl]
    restart: "no"

  control:
    image: ${PROBECTL_IMAGE:-ghcr.io/imfeelingtheagi/probectl-control:v0.4.0} # SUPPLY-001: pinned, never :latest
    depends_on:
      postgres:
        condition: service_healthy
      certgen:
        condition: service_completed_successfully
    environment:
      # HTTPS only. TLS cert/key make the listener serve TLS; HSTS is on.
      PROBECTL_HTTP_ADDR: ":8443"
      PROBECTL_TLS_CERT_FILE: /certs/tls.crt
      PROBECTL_TLS_KEY_FILE: /certs/tls.key
      PROBECTL_HSTS_ENABLED: "true"
      # sslmode=require (U-039): encrypted to the in-network Postgres above.
      PROBECTL_DATABASE_URL: postgres://probectl:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env (no default ships — SEC-006)}@postgres:5432/probectl?sslmode=require
      PROBECTL_MIGRATE_ON_BOOT: "true"
      # At-rest encryption is ON BY DEFAULT (SEC-002): when PROBECTL_ENVELOPE_KEY
      # is unset, the control plane GENERATES a KEK at the key-file path on
      # first boot and persists it on the controldata volume (0600). Back that
      # volume up like key material. Provide PROBECTL_ENVELOPE_KEY explicitly
      # (e.g. from a KMS/secret manager) to override — it always wins.
      PROBECTL_ENVELOPE_KEY: ${PROBECTL_ENVELOPE_KEY:-}
      PROBECTL_ENVELOPE_KEY_FILE: ${PROBECTL_ENVELOPE_KEY_FILE:-/var/lib/probectl/envelope.key}
      # Fail closed (TENANT-106): refuse to start rather than silently write
      # plaintext if no key resolves.
      PROBECTL_REQUIRE_AT_REST_ENCRYPTION: ${PROBECTL_REQUIRE_AT_REST_ENCRYPTION:-true}
      # Secure default: "session" (OIDC SSO + PROBECTL_OIDC_*) — unauthenticated
      # requests are refused. "dev" (all-access, NO auth) is an explicit opt-in
      # for local evaluation only and logs a loud startup warning.
      PROBECTL_AUTH_MODE: ${PROBECTL_AUTH_MODE:-session}
      PROBECTL_OIDC_ISSUER: ${PROBECTL_OIDC_ISSUER:-}
      PROBECTL_OIDC_CLIENT_ID: ${PROBECTL_OIDC_CLIENT_ID:-}
      PROBECTL_OIDC_CLIENT_SECRET: ${PROBECTL_OIDC_CLIENT_SECRET:-}
      PROBECTL_OIDC_REDIRECT_URL: ${PROBECTL_OIDC_REDIRECT_URL:-}
      PROBECTL_SECURITY_CONTACT: ${PROBECTL_SECURITY_CONTACT:-}
      PROBECTL_LOG_FORMAT: json
    ports:
      - "8443:8443" # HTTPS ONLY — no plaintext API port is published.
    volumes:
      - certs:/certs:ro
      - controldata:/var/lib/probectl
    networks: [probectl]
    restart: unless-stopped

volumes:
  pgdata: {}
  certs: {}
  # Holds the generated at-rest envelope key (SEC-002) — back it up.
  controldata: {}

networks:
  probectl: {}
