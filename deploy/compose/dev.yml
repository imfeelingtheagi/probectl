# probectl local development dependency stack.
#
# Brings up the four backing services the control plane talks to during local
# development: Postgres, Kafka (KRaft, no ZooKeeper), ClickHouse, and Prometheus.
#
#   make compose-up     # docker compose -f deploy/compose/dev.yml up -d --wait
#   make compose-down
#
# This is a LOCAL, NON-PRODUCTION stack: it uses plaintext listeners and default
# dev credentials for convenience. The shipped production deploys are
# HTTPS/TLS-by-default (CLAUDE.md §7 guardrail 12). Service names, ports, and
# credentials are documented in docs/configuration.md.
name: probectl-dev

services:
  postgres:
    image: postgres:16@sha256:4b7183ac05f8ef417db21fd72d71047a4238340c261d3cc3ddb6d579ab5071ae # digest-pinned (U-061)
    environment:
      POSTGRES_USER: probectl
      POSTGRES_PASSWORD: probectl
      POSTGRES_DB: probectl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U probectl -d probectl"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s
    networks: [probectl]

  # DEV ONLY: this kafka broker is plaintext (no tls). A control plane / agent pointed at it
  # must set PROBECTL_BUS_ALLOW_PLAINTEXT=true (resp. PROBECTL_<AGENT>_BUS_
  # ALLOW_PLAINTEXT=true) — production kafka requires TLS
  # (PROBECTL_BUS_TLS_ENABLED=true [+ CA/SASL]); plaintext is refused (U-010).
  kafka:
    image: apache/kafka:3.9.0@sha256:fbc7d7c428e3755cf36518d4976596002477e4c052d1f80b5b9eafd06d0fff2f # digest-pinned (U-061)
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Single-node KRaft: the broker half reaches the controller half over
      # loopback, so the CONTROLLER listener binds a *routable* address
      # (localhost) rather than 0.0.0.0. Kafka 3.9.0 wrongly routability-checks
      # the bind address of the non-advertised controller listener at format
      # time and rejects the 0.0.0.0 meta-address (KAFKA-18281); binding the
      # controller to localhost sidesteps that validation bug. The broker
      # listeners below still bind 0.0.0.0 so host + in-network clients reach them.
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # PLAINTEXT (9092) is for clients on the host (localhost:9092);
      # INTERNAL (19092) is for other containers in this network (kafka:19092).
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093,INTERNAL://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks: [probectl]

  clickhouse:
    image: clickhouse/clickhouse-server:24.8@sha256:1ffa82edee000a42c09313bd9f1293d94c570aee74babc1b3ca9983a35fa597b # digest-pinned (U-061)
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: probectl
      CLICKHOUSE_PASSWORD: probectl
      CLICKHOUSE_DB: probectl
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --host localhost --user probectl --password probectl --query 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks: [probectl]

  prometheus:
    image: prom/prometheus:v3.1.0@sha256:6559acbd5d770b15bb3c954629ce190ac3cbbdb2b7f1c30f0385c4e05104e218 # digest-pinned (U-061)
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Lets the result pipeline (S6) Prometheus-remote-write into this instance.
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9090/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s
    networks: [probectl]

volumes:
  pgdata:
  chdata:
  promdata:

networks:
  probectl:
    name: probectl-dev
