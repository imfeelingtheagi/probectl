# probectl flow collector configuration (shipped as a CONFFILE in the deb/rpm so
# operator edits survive upgrades). It listens for NetFlow v5/v9, IPFIX and sFlow
# exports and publishes normalized flow records to the bus. Full key reference:
# docs/configuration.md. Bus credentials are NOT stored here — provide them via
# the environment (PROBECTL_FLOW_BUS_*), so no secret lands in the journal.
tenant_id: ""                 # REQUIRED: binds every flow record to one tenant (F50)
agent_id: ""                  # defaults to the OS hostname
bus:
  mode: kafka                 # memory | kafka
  brokers: ["BROKER-HOST:9093"]
  namespace: ""               # siloed bus lane for this tenant; empty = pooled
# Exporter listeners — enable the protocols your network devices send. Bind
# addresses use their IANA defaults; ensure the host firewall allows them.
netflow:
  enabled: true
  listen: ":2055"
ipfix:
  enabled: true
  listen: ":4739"
sflow:
  enabled: true
  listen: ":6343"
