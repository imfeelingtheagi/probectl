# probectl endpoint (digital-experience) agent configuration (shipped as a
# CONFFILE in the deb/rpm so operator edits survive upgrades). It runs last-mile
# path traces and session-timing probes and publishes DEM results to the bus.
# Full key reference: docs/configuration.md. Bus credentials come from the
# environment (PROBECTL_ENDPOINT_BUS_*), never this file.
tenant_id: ""                 # REQUIRED: binds every result to one tenant (F50)
agent_id: ""                  # defaults to the OS hostname
bus:
  mode: kafka                 # memory | kafka
  brokers: ["BROKER-HOST:9093"]
  namespace: ""               # siloed bus lane for this tenant; empty = pooled
interval: 60s                 # how often a sample is collected
targets:                      # first target drives the last-mile trace
  - "https://1.1.1.1"
  - "https://www.google.com"
max_hops: 20                  # cap the last-mile trace length
probes: 3                     # samples per hop
session_timeout: 15s          # bound each session probe
