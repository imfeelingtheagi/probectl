# MEDIUM reference values — production HA, fixed scale.
#
#   helm install probectl deploy/helm/probectl -f deploy/helm/probectl/values-medium.yaml ...
#
# Three replicas spread across nodes, a PodDisruptionBudget so the S34 rolling
# upgrade / node drains keep a quorum, and NetworkPolicy ready to enable (set
# networkPolicy.ingressFrom / egressTo for your cluster, then flip enabled).
#
# ⚠️  INTERIM CONSTRAINT (ARCH-003): several read views are still served from
# per-replica process memory — topology, /v1/results/latest, threat detections,
# TLS posture, and endpoint views. Across replicas these are NOT yet coherent:
# the same query can return different answers depending on which replica serves
# it, because each replica only sees the bus traffic IT consumed. Durable,
# replica-coherent view serving (leader-elected view consumers / shared derived
# store) is landing in the durable-serving-layer work. UNTIL THEN, if you depend
# on those views being consistent, run replicaCount: 1 (the result/flow/device
# INGEST pipelines and all TSDB/ClickHouse-backed queries are already coherent
# at any replica count — only the in-RAM views are affected). See docs/ha.md.

replicaCount: 3

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Keep 2 of 3 up during voluntary disruptions (zero-downtime upgrades, S34).
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Spread replicas across nodes for availability.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: probectl

# NetworkPolicy is ON by default (U-086) with two documented holes (in-cluster
# ingress to the API port; allow-all egress) — close them by setting the
# allow-lists; values-large.yaml ships the filled reference shape:
#   networkPolicy:
#     ingressFrom:
#       - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
#     egressTo:
#       - to: [ { ipBlock: { cidr: 10.0.0.0/8 } } ]
#         ports: [ { protocol: TCP, port: 5432 } ]
