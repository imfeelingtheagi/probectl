# MEDIUM reference values — production, fixed scale.
#
#   helm install probectl deploy/helm/probectl -f deploy/helm/probectl/values-medium.yaml ...
#
# A PodDisruptionBudget so node drains / the S34 rolling upgrade keep the control
# plane available, and NetworkPolicy ready to enable (set networkPolicy.ingressFrom
# / egressTo for your cluster, then flip enabled).
#
# READ COHERENCE (ARCH-003 / OPS-010): this reference defaults to a SINGLE
# control-plane replica so it never ships a known-incoherent topology. A few
# read views are still served from per-replica process memory — /v1/results/latest,
# threat detections, and TLS posture — and those are NOT yet coherent across
# replicas (the same query could return different answers depending on which
# replica served it).
#
# What IS already coherent at ANY replica count: every ingest pipeline, every
# TSDB/ClickHouse-backed query, AND the topology graph + endpoint view (they
# adopted per-replica fan-in). The throughput lives in the data tier (Kafka,
# ClickHouse, the TSDB), which you scale INDEPENDENTLY of the control-plane
# replica count — so a single stateless control-plane replica is not the
# bottleneck. It still survives node drains/upgrades via a fast reschedule.
#
# SCALING PATH (docs/ha.md): if your workload does not touch the
# latest-result/threat/TLS views, raise replicaCount now and bump the PDB.
# Otherwise wait for those views to adopt per-replica fan-in (tracked under
# ARCH-003), after which this reference will raise its default.

replicaCount: 1

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Keep the control plane available during voluntary disruptions (zero-downtime
# upgrades, S34). At replicaCount 1 this still ensures the new pod is Ready
# before the old one is evicted on a rolling upgrade.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Spread replicas across nodes for availability (applies once you scale up).
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: probectl

# NetworkPolicy is ON by default (U-086) with two documented holes (in-cluster
# ingress to the API port; allow-all egress) — close them by setting the
# allow-lists; values-large.yaml ships the filled reference shape:
#   networkPolicy:
#     ingressFrom:
#       - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
#     egressTo:
#       - to: [ { ipBlock: { cidr: 10.0.0.0/8 } } ]
#         ports: [ { protocol: TCP, port: 5432 } ]
