# MULTI-REGION / ACTIVE-ACTIVE HA reference overrides (S-EE2, F33).
#
# Deploy this chart release ONCE PER REGION, each with its own region values.
# Example (region "us-east"):
#
#   helm install probectl-us-east deploy/helm/probectl \
#     -f deploy/helm/probectl/values-multiregion.yaml \
#     --set ingress.host=us-east.probectl.example \
#     --set database.url='postgres://…@pg-writer.global.example:5432/probectl?sslmode=require' \
#     --set control.extraEnv.PROBECTL_REGION=us-east \
#     --set control.extraEnv.PROBECTL_DATABASE_READ_URL='postgres://…@pg-replica.us-east.example:5432/probectl?sslmode=require'
#
# The model (see docs/multi-region.md): every region runs interchangeable,
# stateless control-plane + ingest replicas (active-active); durable state is
# ONE Postgres primary (the writer endpoint, database.url) with streaming
# replicas in the other regions (the per-region read endpoint). The control
# plane fences API writes during a failover while reads + telemetry keep
# flowing. Same HTTPS-by-default posture as every other profile.

replicaCount: 3

control:
  authMode: session
  # Multi-region wiring. database.url (below) is the GLOBAL WRITER endpoint —
  # a DNS name / proxy that always resolves to the current primary; a region
  # failover re-points it (see docs/runbooks/region-failover.md).
  extraEnv:
    # THIS release's region (set per region at install time):
    PROBECTL_REGION: "us-east"
    # Every region in the deployment:
    PROBECTL_REGIONS: "us-east,eu-west"
    # The local read replica (read locality); writes always use the writer:
    PROBECTL_DATABASE_READ_URL: "postgres://probectl:probectl@probectl-postgres-replica:5432/probectl?sslmode=require"
    # Replication mode the Postgres tier is configured for: sync (RPO 0) | async:
    PROBECTL_REPLICATION_MODE: "sync"
    # Provisional RPO/RTO targets (human sign-off — see docs/multi-region.md):
    PROBECTL_RPO_SECONDS: "0"
    PROBECTL_RTO_SECONDS: "60"
    # Default data-residency region (governance); strict tenants run siloed:
    PROBECTL_RESIDENCY: "us-east"

database:
  # The GLOBAL WRITER endpoint — re-pointed on failover. TLS in transit.
  url: "postgres://probectl:probectl@pg-writer.global.example:5432/probectl?sslmode=require"

# Keep a quorum during S34 rolling upgrades / node drains, in every region.
podDisruptionBudget:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Spread replicas across nodes/zones within the region for availability.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: topology.kubernetes.io/zone
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: probectl
