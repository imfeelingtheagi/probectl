# MEDIUM reference values — production HA, fixed scale.
#
#   helm install netctl deploy/helm/netctl -f deploy/helm/netctl/values-medium.yaml ...
#
# Three replicas spread across nodes, a PodDisruptionBudget so the S34 rolling
# upgrade / node drains keep a quorum, and NetworkPolicy ready to enable (set
# networkPolicy.ingressFrom / egressTo for your cluster, then flip enabled).

replicaCount: 3

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Keep 2 of 3 up during voluntary disruptions (zero-downtime upgrades, S34).
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Spread replicas across nodes for availability.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: netctl

# NetworkPolicy is available — set the allow-lists, then enable:
