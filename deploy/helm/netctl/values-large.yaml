# LARGE reference values — autoscaled production / provider scale.
#
#   helm install netctl deploy/helm/netctl -f deploy/helm/netctl/values-large.yaml ...
#
# HPA-driven scaling (4–12), a PDB, strict node spread, and NetworkPolicy ON
# (default-deny with an allow-all-egress baseline — tighten egressTo to the exact
# datastores/bus/IdP/feeds in production). Pair with values-multitenant.yaml for
# the MSP/provider posture.

replicaCount: 4   # baseline only; ignored once autoscaling owns scaling

resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "4"
    memory: 4Gi

autoscaling:
  enabled: true
  minReplicas: 4
  maxReplicas: 12
  targetCPUUtilizationPercentage: 65

podDisruptionBudget:
  enabled: true
  minAvailable: 3

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: netctl

# Default-deny network posture. Ingress is restricted to the API port; egress is
# permit-all UNTIL you fill egressTo (then it is restricted to those targets + DNS).
networkPolicy:
  enabled: true
  # ingressFrom:
  #   - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
  # egressTo:
  #   - to: [ { ipBlock: { cidr: 10.0.0.0/8 } } ]
  #     ports: [ { protocol: TCP, port: 5432 } ]
