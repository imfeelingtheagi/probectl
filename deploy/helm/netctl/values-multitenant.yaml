# MULTI-TENANT / PROVIDER (MSP) reference overrides.
#
#   helm install netctl deploy/helm/netctl \
#     -f deploy/helm/netctl/values-multitenant.yaml \
#     --set ingress.host=netctl.msp.example --set database.url=...
#
# Same HTTPS-by-default posture as single-tenant; the difference is scale +
# provider operation. Tenant isolation (RLS / pooled scoping) is enforced by the
# control plane regardless of deployment shape — this file only sizes the runtime.

replicaCount: 3

control:
  authMode: session      # provider deployments always use real SSO

# Keep a quorum during the S34 rolling upgrade / node drains.
podDisruptionBudget:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# Spread replicas across nodes for availability.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: netctl

ingress:
  enabled: true
  className: nginx
  # Per-tenant white-label hostnames are layered on by the provider plane (S-T4);
  # this is the provider/admin entry host.
  host: netctl.msp.example.com
  tlsSecretName: netctl-msp-tls
