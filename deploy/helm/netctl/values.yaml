# Default values for netctl — SINGLE-TENANT (sovereign) reference.
#
# HTTPS-by-default: the ingress terminates TLS and sets HSTS; the Service is
# ClusterIP (no plaintext API is exposed externally). See values-multitenant.yaml
# for the MSP / provider reference.

image:
  repository: ghcr.io/imfeelingtheagi/netctl-control
  tag: ""                # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

# Apply database migrations from an init container before the server starts.
migrateOnBoot: true

control:
  # Identity mode: "session" (real OIDC SSO — set oidc.* below) or "dev"
  # (all-access; NEVER in production).
  authMode: session
  logFormat: json
  logLevel: info
  # RFC 9116 disclosure contact served at /.well-known/security.txt.
  securityContact: "mailto:security@your-org.example"
  # Extra NETCTL_* env vars, as a map of name: value.
  extraEnv: {}

oidc:
  issuer: ""
  clientId: ""
  # The secret is stored in the chart Secret (or supply via existingSecret).
  clientSecret: ""
  redirectUrl: ""

# Secret material. Prefer existingSecret in production (managed externally).
secrets:
  # Name of a pre-created Secret holding NETCTL_ENVELOPE_KEY / NETCTL_DATABASE_URL
  # / NETCTL_OIDC_CLIENT_SECRET. When set, the chart does NOT create its own.
  existingSecret: ""
  # base64-encoded 32-byte envelope KEK (openssl rand -base64 32). Required.
  envelopeKey: ""

database:
  # Full DSN. Point at your managed Postgres, or the bundled subchart-less
  # Postgres you run separately. TLS in transit is expected in production.
  url: "postgres://netctl:netctl@netctl-postgres:5432/netctl?sslmode=require"

service:
  type: ClusterIP        # never NodePort/LoadBalancer with a plaintext port
  port: 8080

# HTTPS-by-default ingress. TLS is terminated here; HSTS is set; HTTP is
# redirected to HTTPS. No plaintext API is exposed.
ingress:
  enabled: true
  className: nginx
  host: netctl.example.com
  # TLS secret holding the cert for `host`. Use cert-manager (annotations below)
  # or pre-create the secret. HTTPS-by-default requires this to be set.
  tlsSecretName: netctl-tls
  hstsMaxAge: 31536000
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Hardened pod/container security context (non-root, read-only root FS).
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

serviceAccount:
  create: true
  name: ""

nodeSelector: {}
tolerations: []
affinity: {}
