{{- if not .Values.secrets.existingSecret }}
{{- if not .Values.secrets.envelopeKey }}
{{- fail "secrets.envelopeKey is required (base64 32-byte KEK) unless secrets.existingSecret is set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netctl.fullname" . }}-secrets
  labels:
    {{- include "netctl.labels" . | nindent 4 }}
type: Opaque
stringData:
  NETCTL_ENVELOPE_KEY: {{ .Values.secrets.envelopeKey | quote }}
  NETCTL_DATABASE_URL: {{ .Values.database.url | quote }}
  {{- if .Values.oidc.clientSecret }}
  NETCTL_OIDC_CLIENT_SECRET: {{ .Values.oidc.clientSecret | quote }}
  {{- end }}
{{- end }}
