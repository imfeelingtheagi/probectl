{{- if .Values.ingress.enabled }}
{{- if not .Values.ingress.tlsSecretName }}
{{- fail "ingress.tlsSecretName is required (HTTPS-by-default): provide a TLS secret or use cert-manager" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "netctl.fullname" . }}
  labels:
    {{- include "netctl.labels" . | nindent 4 }}
  annotations:
    # HTTPS-by-default: force redirect to TLS and emit HSTS on every response.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age={{ .Values.ingress.hstsMaxAge }}; includeSubDomains";
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "netctl.fullname" . }}
                port:
                  name: http
{{- end }}
