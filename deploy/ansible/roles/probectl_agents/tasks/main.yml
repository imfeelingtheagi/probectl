---
# OPS-004: install + enroll + run a probectl agent, idempotently. Re-runs are
# no-ops once the agent is installed and enrolled. The serial-batched upgrade
# play (see playbooks/upgrade.yml) drives this respecting the N/N-1 skew gate.

- name: Assert required vars
  ansible.builtin.assert:
    that:
      - probectl_version | length > 0
      - probectl_control_grpc_addr | length > 0
    fail_msg: "probectl_version and probectl_control_grpc_addr are required"

- name: Install from the signed apt repo (Debian/Ubuntu)
  when: probectl_install_method == 'repo' and ansible_os_family == 'Debian'
  block:
    - name: Add probectl apt repo
      ansible.builtin.apt_repository:
        repo: "{{ probectl_apt_repo }}"
        state: present
    - name: Install package
      ansible.builtin.apt:
        name: "probectl-{{ probectl_agent_type }}={{ probectl_version }}*"
        state: present
        update_cache: true

- name: Install from the signed yum repo (RHEL family)
  when: probectl_install_method == 'repo' and ansible_os_family == 'RedHat'
  ansible.builtin.yum:
    name: "probectl-{{ probectl_agent_type }}-{{ probectl_version }}"
    state: present

# OPS-011: nfpm names the deb/rpm with Debian/RPM arch (amd64|arm64), but
# ansible_architecture reports the kernel arch (x86_64|aarch64). Map it before
# composing the filename, and fail closed on an arch we don't ship a package
# for rather than constructing a path that will never exist.
- name: Resolve the package arch from ansible_architecture
  when: probectl_install_method == 'airgap'
  ansible.builtin.set_fact:
    probectl_pkg_arch: >-
      {{ {'x86_64': 'amd64', 'amd64': 'amd64',
          'aarch64': 'arm64', 'arm64': 'arm64'}[ansible_architecture] | default('') }}

- name: Assert the host arch maps to a shipped package arch
  when: probectl_install_method == 'airgap'
  ansible.builtin.assert:
    that:
      - probectl_pkg_arch | length > 0
    fail_msg: >-
      No probectl package is shipped for ansible_architecture={{ ansible_architecture }}
      (shipped: x86_64->amd64, aarch64->arm64).

- name: Install from the air-gap bundle
  when: probectl_install_method == 'airgap'
  ansible.builtin.package:
    name: "{{ probectl_airgap_dir }}/probectl-{{ probectl_agent_type }}_{{ probectl_version }}_{{ probectl_pkg_arch }}.deb"
    state: present

# SUPPLY-002: the package_url method downloads a release package directly and,
# when probectl_verify_cosign is true, cryptographically verifies it with cosign
# BEFORE install. Verification is fail-closed: a missing cosign, missing
# signature/cert, or a failed check aborts the play before the package is
# installed. (Previously package_url had no task block at all — selecting it
# installed nothing — and probectl_verify_cosign was referenced nowhere.)
- name: Install from a package URL
  when: probectl_install_method == 'package_url'
  block:
    - name: Assert a package URL was given
      ansible.builtin.assert:
        that: probectl_package_url | length > 0
        fail_msg: "probectl_install_method=package_url requires probectl_package_url"

    - name: Download the package
      ansible.builtin.get_url:
        url: "{{ probectl_package_url }}"
        dest: "/tmp/probectl-{{ probectl_agent_type }}-{{ probectl_version }}.pkg"
        mode: "0644"
      register: probectl_pkg

    - name: Verify the package with cosign (fail-closed)
      when: probectl_verify_cosign | bool
      block:
        - name: Ensure cosign is available
          ansible.builtin.command: cosign version
          changed_when: false

        - name: Download the cosign signature + certificate
          ansible.builtin.get_url:
            url: "{{ probectl_package_url }}{{ item.suffix }}"
            dest: "{{ probectl_pkg.dest }}{{ item.suffix }}"
            mode: "0644"
          loop:
            - { suffix: ".sig" }
            - { suffix: ".pem" }

        - name: cosign verify-blob (pinned to the probectl release identity)
          ansible.builtin.command:
            argv:
              - cosign
              - verify-blob
              - --certificate
              - "{{ probectl_pkg.dest }}.pem"
              - --signature
              - "{{ probectl_pkg.dest }}.sig"
              - --certificate-oidc-issuer
              - "{{ probectl_cosign_issuer }}"
              - --certificate-identity-regexp
              - "{{ probectl_cosign_identity_regexp }}"
              - "{{ probectl_pkg.dest }}"
          changed_when: false
          # A non-zero exit (tampered/unsigned package) fails the play here,
          # before the install task below runs — the package is never installed.

    - name: Install the (verified) package
      ansible.builtin.package:
        name: "{{ probectl_pkg.dest }}"
        state: present

- name: Template the agent config
  ansible.builtin.template:
    src: agent.yaml.j2
    dest: "/etc/probectl/{{ probectl_agent_type }}.yaml"
    owner: probectl
    group: probectl
    mode: "0640"
  notify: restart probectl agent

- name: Check whether the mTLS agent already has an identity
  when: probectl_agent_type in probectl_mtls_agent_types
  ansible.builtin.stat:
    path: "{{ probectl_state_dir }}/identity/agent.crt"
  register: probectl_identity

# OPS-004: only the canary `agent` ships an `enroll` subcommand — it mints an
# mTLS identity by redeeming a one-time token against the control-plane gRPC
# endpoint (cmd/probectl-agent/enroll.go). The bus collectors (ebpf-agent,
# flow-agent, device-agent, endpoint) have NO per-host enroll command: they are
# registered ONCE on the control plane with `probectl-control register-collector`
# (cmd/probectl-control/enroll.go), which mints a tenant_id/agent_id the
# collector stamps on the records it publishes to the bus — no certificate is
# issued. Running `<binary> enroll` for those types would fail (unknown
# subcommand). So the enroll task is gated to the mTLS `agent` only; collectors
# get a one-time guidance message instead.
- name: Enroll the mTLS canary agent (one-time; token from vault, never persisted)
  when:
    - probectl_agent_type in probectl_mtls_agent_types
    - not probectl_identity.stat.exists
    - probectl_enroll_token | length > 0
  ansible.builtin.command:
    cmd: >-
      /usr/bin/probectl-{{ probectl_agent_type }} enroll
      --server {{ probectl_control_grpc_addr }}
      --token {{ probectl_enroll_token }}
      --dir {{ probectl_state_dir }}/identity
  no_log: true   # the token must never reach the Ansible log
  notify: restart probectl agent

- name: Remind operator how bus collectors register (no per-host enroll)
  when: probectl_agent_type not in probectl_mtls_agent_types
  ansible.builtin.debug:
    msg: >-
      probectl-{{ probectl_agent_type }} is a bus collector and has no `enroll`
      subcommand. Register it ONCE on the control plane with:
      `probectl-control register-collector --token <pjt_...> --plane {{ probectl_collector_plane | default(probectl_agent_type | regex_replace('-agent$', '')) }} --hostname {{ inventory_hostname }}`,
      then set the minted tenant_id/agent_id in /etc/probectl/{{ probectl_agent_type }}.yaml.

- name: Enable + start the agent
  ansible.builtin.systemd:
    name: "probectl-{{ probectl_agent_type }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Verify the agent registered (heartbeat reached the control plane)
  ansible.builtin.command:
    cmd: "systemctl is-active probectl-{{ probectl_agent_type }}"
  register: probectl_active
  changed_when: false
  failed_when: probectl_active.stdout != "active"
