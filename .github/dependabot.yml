# Dependabot keeps the SHA-pinned GitHub Actions fresh (U-007): it bumps the
# commit SHA and rewrites the trailing "# <tag>" comment, so pins never rot.
# scripts/check_action_pins.sh (the action-pins CI job) rejects any non-SHA ref.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  # U-061: keep the digest-pinned images fresh (dependabot updates the
  # @sha256 and the tag together).
  - package-ecosystem: docker
    directory: /deploy/docker
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /browser-worker
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /deploy/compose
    schedule:
      interval: weekly
  # SUPPLY-003: keep the analyzer's hash-locked dependency set fresh (the
  # lock-matches-pyproject CI step refuses drift either way).
  - package-ecosystem: pip
    directory: /analyzer
    schedule:
      interval: weekly
