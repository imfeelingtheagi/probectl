name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  PYTHON_VERSION: "3.12"

jobs:
  action-pins:
    name: action-pins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Every workflow action is SHA-pinned (U-007)
        run: ./scripts/check_action_pins.sh
      - name: supply-pins gate (SUPPLY-001/002/006 — no :latest, no unpinned installs)
        run: ./scripts/check_supply_pins.sh SELFTEST && ./scripts/check_supply_pins.sh

  secret-scan:
    # Sprint 1 (CODE-006): no committed secrets, ever. gitleaks scans the
    # working tree at HEAD (--no-git: history is immutable; the one historical
    # test-key was a documented throwaway, removed in Sprint 1). Allowlist
    # policy lives in .gitleaks.toml (deliberate redaction-test fixtures only).
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install gitleaks (pinned, sumdb-verified)
        run: go install github.com/zricethezav/gitleaks/v8@v8.18.4
      - name: Scan the tree for secrets
        run: gitleaks detect --no-git --no-banner --source . --config .gitleaks.toml

  no-devauth-in-release:
    # Sprint 3 (RED-001/SEC-001): the dev-auth bypass must be PHYSICALLY
    # absent from release binaries. Three checks: symbol absence, the
    # synthesized dev-principal literal absence, and the authoritative
    # behavioral one — a release binary refuses PROBECTL_AUTH_MODE=dev at
    # boot. A tagged build is also compiled to prove the gate DETECTS the
    # symbols when they exist (no vacuous pass).
    name: no-devauth-in-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build release (untagged) + devauth-tagged binaries
        run: |
          go build -o /tmp/pc ./cmd/probectl-control
          go build -tags devauth -o /tmp/pcdev ./cmd/probectl-control
      - name: Release binary has NO dev-auth symbols or literals
        run: |
          if go tool nm /tmp/pc | grep -qiE "devauth|devprincipal"; then
            echo "::error::release binary contains dev-auth symbols"; exit 1; fi
          if strings /tmp/pc | grep -q "dev@probectl.local"; then
            echo "::error::release binary contains the dev principal literal"; exit 1; fi
          echo "release binary clean"
      - name: Gate self-test (tagged build MUST trip the same greps)
        run: go tool nm /tmp/pcdev | grep -qiE "devauth" && echo "gate detects tagged builds"
      - name: Behavioral — release binary refuses dev mode at boot
        run: |
          set +e
          out=$(PROBECTL_AUTH_MODE=dev /tmp/pc 2>&1); rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "::error::release binary STARTED in dev mode"; exit 1; }
          echo "$out" | grep -q "not compiled into this binary" || { echo "::error::wrong refusal: $out"; exit 1; }
          echo "release refusal verified"

  verify-branch-protection:
    # Sprint 1 (TEST-002, SUPPLY-007): .github/rulesets/main.json is the
    # committed source of truth; this job reads the EFFECTIVE rules on the
    # default branch (readable with the default token) and fails on drift —
    # so "CI is a merge gate" is proven from inside the repo, every run.
    name: verify-branch-protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Compare live rules to the committed ruleset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/check_branch_protection.sh

  lint-go:
    name: lint-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install pinned tools (golangci-lint)
        run: |
          make tools
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: gofmt + go vet + golangci-lint
        run: make lint-go

  lint-python:
    name: lint-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff==0.15.16 black==26.5.1 # SUPPLY-002: exact pins (versions tracked in analyzer/requirements-dev.lock)
      - name: ruff + black --check
        run: make lint-python

  editions-gate:
    name: editions-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Editions guard (self-tested) + core-only build/test
        run: make editions-gate

  fips-gate:
    name: fips-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: FIPS artifact builds + power-on self-test (validated module active)
        run: make build-fips fips-gate

  test-go:
    name: test-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Unit tests (all workspace modules)
        run: |
          set -o pipefail
          make test 2>&1 | tee test-go.log
      # Sprint 1 (DATAROOM-011): the test log is a retained receipt.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: test-go-log
          path: test-go.log
          retention-days: 90
      - name: Backup-encryption + erasure-covers-backups gate (OPS-002, COMPLY-002)
        run: go test -count=1 -v -run "Backup|Restore|Erasure|Retention|Coverage|SealOpen|Tamper" ./internal/backup/ ./internal/tenantlife/
      - name: Fuzz smoke (untrusted-input parsers must not crash)
        run: make fuzz-smoke
      - name: Agent overhead bench smoke (U-051 — benches compile + run; the
          throughput tripwire already ran inside make test)
        run: go test -bench . -benchtime 1000x -run '^$' ./internal/ebpf/...
      - name: Cross-compile (linux amd64 + arm64)
        run: make build-cross
      - name: Endpoint agent cross-OS build (Linux/macOS/Windows)
        run: make endpoint-build

  # U-049 → TEST-003 (Sprint 21, FOUNDER DECISION): the RCA quality eval is
  # BLOCKING. "Non-blocking initially" served its purpose — the baseline
  # exists (accuracy 0.91 / citation precision 0.92); the floor below sits
  # comfortably under it and catches regressions. Runs the >=20-scenario
  # eval set through the real planner->engine->synthesize pipeline against
  # the deterministic builtin model.
  rca-eval:
    name: rca-eval (BLOCKING — floors 0.85/0.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run the RCA eval set (U-049)
        run: PROBECTL_RCA_EVAL_REPORT=$PWD/rca-eval-report.json go test -count=1 -v -run TestRCAEval ./internal/ai/eval/ | tee rca-eval.log
      - name: Enforce the quality floor (TEST-003 — answer_accuracy >= 0.85 AND citation_precision >= 0.85)
        run: |
          python3 - <<'EOF'
          import json, sys
          r = json.load(open("rca-eval-report.json"))
          acc, prec = r["answer_accuracy"], r["mean_citation_precision"]
          print(f"answer_accuracy={acc:.3f} citation_precision={prec:.3f} (floors 0.85/0.85; baseline 0.91/0.92)")
          if acc < 0.85 or prec < 0.85:
              print("::error::RCA quality regression below the TEST-003 floor")
              sys.exit(1)
          EOF
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: rca-eval-report
          path: |
            rca-eval-report.json
            rca-eval.log
          retention-days: 90

  coverage:
    name: coverage
    # Per-package statement-coverage floor on the service-free logic / parser /
    # probe packages (scripts/check_coverage.sh). Stateful DB/transport packages
    # are gated for correctness by the integration + cross-tenant-isolation jobs.
    #
    # Sprint 1 (TEST-008, DATAROOM-005): coverage.out + a per-package summary
    # are retained as workflow artifacts on every run (the diligence receipt),
    # and PRs get a best-effort summary comment. No bot ever pushes to main.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Coverage gate
        run: make cover-gate
      - name: Coverage summary (receipt)
        if: always()
        run: |
          { echo "## Coverage summary ($(git rev-parse --short HEAD))"; echo; echo '```'; \
            go tool cover -func=coverage.out | tail -40; echo '```'; } > coverage-summary.txt
          tail -3 coverage-summary.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-receipt
          path: |
            coverage.out
            coverage-summary.txt
          retention-days: 90
      - name: PR comment (best-effort)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file coverage-summary.txt || true

  test-python:
    name: test-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      # SUPPLY-003: hash-locked install — the lock IS the dependency set;
      # the analyzer itself installs --no-deps so nothing floats.
      - run: pip install --require-hashes -r analyzer/requirements-dev.lock
      - run: pip install --no-deps -e ./analyzer
      - name: Lock matches pyproject (refuse drift)
        run: |
          pip install uv==0.11.2
          uv pip compile analyzer/pyproject.toml --extra dev --generate-hashes -o /tmp/requirements-dev.lock --quiet
          # The header comment embeds the output path; compare content only.
          diff -u <(grep -v '^#' analyzer/requirements-dev.lock) <(grep -v '^#' /tmp/requirements-dev.lock) \
            || { echo "::error::analyzer/requirements-dev.lock is stale — regenerate with: cd analyzer && uv pip compile pyproject.toml --extra dev --generate-hashes -o requirements-dev.lock"; exit 1; }
      - run: make test-python

  browser-worker:
    name: browser-worker
    # S36, F15: the Playwright browser-synthetic worker. Runs INSIDE the official
    # Playwright image (Chromium + deps preinstalled), so the smoke test exercises a
    # real scripted login against a local app — success timings/waterfall/DOM and a
    # failure screenshot. The Go side (internal/browser) is covered by the unit job.
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.55.1-noble
    defaults:
      run:
        working-directory: browser-worker
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install deps (lockfile-faithful, U-029)
        run: npm ci --no-audit --no-fund
      - name: syntax check
        run: npm run check
      - name: real-browser smoke (scripted login vs a local app)
        run: npm test

  openapi-gate:
    name: openapi-gate
    # S19, F23: no undocumented routes ship at a GA milestone. Validates the spec
    # is OpenAPI 3.1 and that the registered /v1 routes exactly match the spec.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: OpenAPI completeness gate
        run: make openapi-gate

  migration-gate:
    name: migration-gate
    # S34, F28: zero-downtime upgrades require additive (expand/contract) migrations
    # — release N's schema must work with N-1's code (rollback) and N's code. Rejects
    # destructive/blocking changes (drop column, type change, rename, NOT NULL adds).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Migration expand/contract gate
        run: make migration-gate

  helm-gate:
    name: helm-gate
    # S19 + S35, F29: the shipped Helm chart lints for every reference profile and
    # upholds the secure-by-default hardening invariants (non-root/read-only pod,
    # NetworkPolicy/PDB/HPA, /readyz drain probe, HSTS, no default credentials).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.2
      - name: helm lint + hardening gate (small/medium/large/multitenant + agent chart)
        run: make helm-gate
      - name: kubeconform (rendered charts are valid Kubernetes; U-016)
        run: |
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          echo "95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73  /tmp/kubeconform.tar.gz" | sha256sum -c -
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          helm template agent deploy/helm/probectl-agent \
            --set tenantID=ci --set 'bus.brokers={kafka:9093}' \
            | /tmp/kubeconform -strict -summary
          helm template probectl deploy/helm/probectl \
            --set ingress.host=h.example.com --set ingress.tlsSecretName=probectl-tls \
            --set secrets.envelopeKey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA= \
            | /tmp/kubeconform -strict -summary
          # OPS-004/005/009: the strict regulated profile renders valid too
          # (the ServiceMonitor is a Prometheus-Operator CRD — skip it).
          helm template probectl deploy/helm/probectl \
            -f deploy/helm/probectl/values-strict.yaml \
            --set ingress.host=h.example.com --set ingress.tlsSecretName=probectl-tls \
            --set secrets.envelopeKey=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA= \
            | /tmp/kubeconform -strict -summary -skip ServiceMonitor
      - name: GitOps manifests valid (ArgoCD + Flux)
        run: |
          python3 -m pip install --quiet pyyaml==6.0.3 # SUPPLY-006: exact pin
          make gitops-gate
      - name: compose config is valid
        run: docker compose -f deploy/compose/probectl.yml config >/dev/null

  terraform-gate:
    name: terraform-gate
    # S35, F29: the probectl Terraform module is fmt-clean and validates (fmt +
    # `terraform validate` of the example root that consumes it).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.9.8
      - name: terraform fmt + validate
        run: make terraform-gate

  ebpf-kernel-matrix:
    name: ebpf-kernel-matrix (${{ matrix.kernel }})
    # U-021: the BPF programs are LOADED and ATTACHED on real LTS kernels —
    # not just statically checked. vimto boots each kernel under QEMU (KVM is
    # available on GitHub runners) with the runner rootfs, and `go test -exec`
    # runs the live smoke (load, attach tracepoint + uprobes, one agent flush
    # cycle; the U-014 digest verification runs inherently). Kernel images are
    # digest-pinned; the runner-side build is the same bpf2go path operators
    # use (make ebpf-agent). The observe-only static gate runs in test-go.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # EBPF-008: x86_64 LTS pair + arm64 (native runner — vimto does not
        # emulate cross-arch) + a hardened entry that raises kernel lockdown
        # to INTEGRITY inside the ephemeral VM (one-way sysfs write) and
        # proves load+attach still works there. ci-kernels images are
        # multi-arch indexes — the same digest serves both runners.
        include:
          - kernel: "5.15"
            runner: ubuntu-latest
            run: "TestLive"
            image: ghcr.io/cilium/ci-kernels:5.15@sha256:11bbf6ada68fdd8850c020b955b84bc16ed6227cdbadbb437da83db6eb02a9d0
          - kernel: "6.6"
            runner: ubuntu-latest
            run: "TestLive"
            image: ghcr.io/cilium/ci-kernels:6.6@sha256:0b7036c12c2a357672a81e7ff7bf02cc67fe06acb2c4b0206e2a15949d2193bd
          - kernel: "6.6-arm64"
            runner: ubuntu-24.04-arm
            run: "TestLive"
            image: ghcr.io/cilium/ci-kernels:6.6@sha256:0b7036c12c2a357672a81e7ff7bf02cc67fe06acb2c4b0206e2a15949d2193bd
          - kernel: "6.6-lockdown"
            runner: ubuntu-latest
            run: "TestLiveHardenedLockdown"
            image: ghcr.io/cilium/ci-kernels:6.6@sha256:0b7036c12c2a357672a81e7ff7bf02cc67fe06acb2c4b0206e2a15949d2193bd
            env_extra: "PROBECTL_TEST_SET_LOCKDOWN=integrity"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Toolchain (clang + bpftool + qemu)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q clang llvm libbpf-dev linux-tools-common linux-tools-generic qemu-system-x86 qemu-system-arm
      - name: Generate + compile the BPF objects (the operator build path)
        run: |
          set -euo pipefail
          # The /usr/sbin/bpftool shim dispatches on `uname -r`, and the
          # runner's azure kernel ships no matching linux-tools package — call
          # the linux-tools-generic binary directly (dumping the BTF blob at
          # /sys/kernel/btf/vmlinux is not coupled to the running kernel).
          BPFTOOL="$(find /usr/lib -path '*linux-tools*' -name bpftool -type f | sort -V | tail -n1)"
          test -n "${BPFTOOL}" || { echo "no bpftool binary under /usr/lib (linux-tools-generic missing?)"; exit 1; }
          "${BPFTOOL}" btf dump file /sys/kernel/btf/vmlinux format c > internal/ebpf/bpf/vmlinux.h
          (cd internal/ebpf && go run github.com/cilium/ebpf/cmd/bpf2go -cc clang -target bpfel -tags ebpf -go-package ebpf l4flow ./bpf/l4flow.bpf.c -- -I./bpf)
          (cd internal/ebpf && go run github.com/cilium/ebpf/cmd/bpf2go -cc clang -target amd64,arm64 -tags ebpf -go-package ebpf sslsniff ./bpf/sslsniff.bpf.c -- -I./bpf)
          (cd internal/ebpf && go run ./gendigests .)   # U-014 manifest
      - name: Cache kernel image
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4 (same pin trivy-action uses)
        with:
          path: ~/.cache/vimto
          key: vimto-kernel-${{ matrix.kernel }}-${{ runner.arch }}
      - name: Load + attach on the ${{ matrix.kernel }} kernel (QEMU)
        run: |
          set -euo pipefail
          CGO_ENABLED=0 go install lmb.io/vimto@v0.4.0   # vimto re-execs itself as the VM init — must be static
          sudo chmod 0666 /dev/kvm || true
          env ${{ matrix.env_extra }} CGO_ENABLED=0 go test -tags ebpf -exec "$(go env GOPATH)/bin/vimto -kernel ${{ matrix.image }} -sudo exec --"             -run '${{ matrix.run }}' -count=1 -v ./internal/ebpf/

  ebpf-image-live:
    # EBPF-004: the SHIPPED probectl-ebpf-agent image must carry the LIVE
    # CO-RE loader, not the fixture replayer. Build the release Dockerfile
    # (deploy/docker/Dockerfile.ebpf — the same file release.yml publishes),
    # extract the binary, and assert the Go build metadata records
    # -tags=ebpf. A fixture-only image cannot pass.
    name: ebpf-image-live (EBPF-004)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build the shipped image (amd64, local load)
        run: |
          docker buildx build --load -f deploy/docker/Dockerfile.ebpf \
            -t probectl-ebpf-agent:ci-assert .
      - name: Assert the binary is the live (-tags ebpf) build
        run: |
          set -euo pipefail
          cid="$(docker create probectl-ebpf-agent:ci-assert)"
          docker cp "${cid}:/usr/local/bin/app" ./ebpf-agent-binary
          docker rm "${cid}" >/dev/null
          go version -m ./ebpf-agent-binary | tee buildinfo.txt
          grep -E '\bbuild\s+-tags=.*\bebpf\b' buildinfo.txt \
            || { echo "::error::shipped probectl-ebpf-agent image is NOT the -tags ebpf live build (EBPF-004)"; exit 1; }

  cross-tenant-isolation:
    name: cross-tenant-isolation
    # Permanent CI gate — CLAUDE.md §7 guardrail 1. From S2 this proves real
    # tenant isolation (RLS + tenancy choke point) against a Postgres service;
    # U-026 extends the SAME gate to real ClickHouse (flowstore + pathstore
    # cross-tenant reads, scoped erasure, and the row-policy DDL).
    runs-on: ubuntu-latest
    # Postgres runs as a docker step (not a service) so it can serve TLS under
    # a per-run test CA — CI talks verify-full like production (OPS-010). The
    # TLS step exports PROBECTL_DATABASE_URL via GITHUB_ENV.
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8@sha256:1ffa82edee000a42c09313bd9f1293d94c570aee74babc1b3ca9983a35fa597b # digest-pinned (U-061)
        env:
          # The entrypoint recreates the `default` user from these (so the
          # outcome is independent of the base image's stock user config), and
          # access_management is required for the EnsureRowPolicies DDL (U-026).
          CLICKHOUSE_PASSWORD: probectl
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - 8123:8123
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      PROBECTL_FLOWSTORE_URL: http://default:probectl@localhost:8123
      PROBECTL_PATHSTORE_URL: http://default:probectl@localhost:8123
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Start TLS Postgres (verify-full, test CA — OPS-010)
        run: ./scripts/ci_pg_tls.sh
      - name: Cross-tenant isolation tests
        run: make test-isolation

  integration:
    name: integration
    # Boots the control plane against a real Postgres and asserts migrations are
    # idempotent and /readyz passes (S1 Done-when). Uses a service container
    # rather than the full compose stack — only Postgres is needed yet.
    runs-on: ubuntu-latest
    # Postgres runs as a docker step so it serves TLS under a per-run test CA;
    # the client connects sslmode=verify-full like production (OPS-010).
    env:
      # Result pipeline (S6): the TSDB remote-write test targets this Prometheus.
      PROBECTL_PROM_URL: http://localhost:9090
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Start TLS Postgres (verify-full, test CA — OPS-010)
        run: ./scripts/ci_pg_tls.sh
      - name: Start Prometheus with the remote-write receiver (result-pipeline test)
        # A service container cannot take the required --web.enable-remote-write-receiver
        # flag, so run it as a step instead.
        run: |
          docker run -d --name prometheus -p 9090:9090 \
            prom/prometheus:v2.55.1 \
            --config.file=/etc/prometheus/prometheus.yml \
            --web.enable-remote-write-receiver
          for i in $(seq 1 30); do
            curl -fsS http://localhost:9090/-/ready >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "prometheus did not become ready" >&2; docker logs prometheus; exit 1
      - name: Integration tests (migrations + readiness + result pipeline)
        run: make test-integration
      - name: Store integration coverage floor (U-057)
        # The store package is correctness-gated here (real PG + RLS), not in
        # the unit-coverage job: measure statement coverage WITH the
        # integration tests and hold the floor. Raise the floor as coverage
        # grows; never lower it to make a regression pass.
        run: |
          go test -tags integration -count=1 -coverprofile=store-cover.out ./internal/store/
          pct=$(go tool cover -func=store-cover.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "internal/store integration coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 60.0) { print "FAIL: internal/store integration coverage " p "% is below the 60% floor (U-057)"; exit 1 } }'

  perf-smoke:
    name: perf-smoke
    # S18a perf-foundation: a cheap, repeatable load baseline (a smoke, not a
    # soak). The ingest baseline needs no services; the pooled multi-tenant smoke
    # asserts tenant-scoped isolation + bounded query latency against Postgres —
    # the first place a pooled-cardinality or RLS-cost regression would surface.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Start TLS Postgres (verify-full, test CA — OPS-010)
        run: ./scripts/ci_pg_tls.sh
      - name: Load/perf smoke (ingest baseline + pooled multi-tenant)
        run: make perf-smoke

  backup-drill:
    name: backup-drill
    # U-030: the backup → wipe → restore drill EXECUTES on every pass against
    # the dev compose Postgres + ClickHouse: nonce-marked rows must survive a
    # full database drop via the off-box artifacts, and the job log carries
    # the measured backup/restore times the runbook cites
    # (docs/ops/backup-restore.md).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: backup → wipe → restore drill
        run: make backup-restore-drill

  failover-drill:
    name: failover-drill
    # U-053: the promote-the-standby failover (the documented multi-region
    # model) is TIMED on every pass: streaming replica, kill -9 the primary,
    # pg_promote, RTO = first successful write on the promoted node, RPO =
    # acked rows lost. Numbers land in the job log; docs/ops/dr.md is the
    # runbook + sign-off table (representative-infra row is human-run).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: timed failover drill (kill primary → promote replica)
        run: make failover-drill

  load-smoke:
    name: load-smoke
    # U-005: the FULL-STACK load gate's S-tier smoke — synthetic agents through
    # real Kafka, the production consumer (retry/DLQ + cardinality caps), real
    # Prometheus remote-write, and tenant-scoped PromQL back out. Proves the
    # harness on every pass; the L/XL run is `make load-test TIER=L|XL` on
    # reference hardware (human-scheduled), results in docs/scale-gate.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Boot Kafka + Prometheus (dev compose subset)
        run: docker compose -f deploy/compose/dev.yml up -d --wait kafka prometheus
      - name: S-tier full-stack load smoke
        run: make load-test-smoke

  proto:
    name: proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          # U-059: pin the buf BINARY too (the action defaults to latest).
          version: 1.50.0
          github_token: ${{ github.token }}
      - name: buf lint
        run: buf lint
      - name: buf breaking (additive-only vs main — BLOCKING, U-056)
        # The proto schema is the agent/bus wire contract: a breaking change
        # strands deployed agents and replayable bus history. This gate blocks
        # merge; the exception process is in CONTRIBUTING.md (version a new
        # package, never mutate a published one).
        #
        # On a PR checkout `main` is not a local ref, so fetch it into a
        # dedicated baseline branch (never the checked-out one, so this also
        # works on push-to-main) and compare the working tree against it.
        run: |
          git fetch --no-tags --force origin main:_buf_breaking_base
          buf breaking --against '.git#branch=_buf_breaking_base'
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install codegen plugins (pinned — U-059)
        # Versions MUST match the committed internal/gen headers; the diff
        # check below fails on any drift (generated-code poisoning guard:
        # plugins are checksum-verified via the Go module sum database, and
        # the output must reproduce the reviewed, committed tree exactly).
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Verify generated code is current
        run: |
          buf generate
          git diff --exit-code -- internal/gen \
            || { echo "::error::generated code is stale — run 'make proto' and commit"; exit 1; }

  web:
    name: web
    # Frontend foundation (S8a): typecheck, lint, the a11y + theme-swap + token
    # guards, and a production build. The test step IS the CI a11y gate.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Audit gate (U-028 — no critical advisories)
        run: npm audit --audit-level=critical
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Frontend-coverage gate (S-FE6 — every capability has its declared surface)
        run: npm run coverage-gate
      - name: Test (a11y gate · theme-swap · command palette · no hardcoded tokens)
        run: npm run test
      - name: Build
        run: npm run build

  dependency-scan:
    name: dependency-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: govulncheck (Go dependencies)
        run: |
          set -o pipefail
          go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./... 2>&1 | tee govulncheck-report.txt
      - name: Trivy filesystem scan (vulns + secrets)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
          output: trivy-fs-report.txt
      - name: Show trivy report
        if: always()
        run: cat trivy-fs-report.txt || true
      # Sprint 1 (DATAROOM-011): scan outputs retained as data-room receipts.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: dependency-scan-receipts
          path: |
            govulncheck-report.txt
            trivy-fs-report.txt
          retention-days: 90

  build-images:
    name: build-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - probectl-control
          - probectl-agent
          - probectl-ebpf-agent
          - probectl-endpoint
          - probectl
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build multi-arch image (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            COMPONENT=${{ matrix.component }}
          push: false
          tags: probectl/${{ matrix.component }}:ci

  image-scan:
    name: image-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build a local amd64 image to scan
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          build-args: |
            COMPONENT=probectl-control
          load: true
          tags: probectl/probectl-control:scan
      - name: Trivy image scan (vulns + secrets)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: probectl/probectl-control:scan
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  commitlint:
    name: commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6
        with:
          configFile: commitlint.config.mjs

  # Sprint 25: the umbrella REQUIRED check closing the diligence
  # "STATIC-ONLY" caveat. One green check == every verification gate above
  # executed and passed (build/lint/race tests/scans/eBPF compile+LOAD on
  # real kernels/isolation/eval/...). It runs even when dependencies fail
  # (if: always()) so it reports an explicit RED instead of a skip, and it
  # archives the gate->result map as the executed-verification receipt
  # (extends DATAROOM-005/-011; per-gate receipts live on their own jobs).
  verify-all:
    name: verify-all (executed-verification umbrella)
    runs-on: ubuntu-latest
    if: always()
    needs:
      - action-pins
      - secret-scan
      - no-devauth-in-release
      - verify-branch-protection
      - lint-go
      - lint-python
      - editions-gate
      - fips-gate
      - test-go
      - rca-eval
      - coverage
      - test-python
      - browser-worker
      - openapi-gate
      - migration-gate
      - helm-gate
      - terraform-gate
      - ebpf-kernel-matrix
      - ebpf-image-live
      - cross-tenant-isolation
      - integration
      - perf-smoke
      - backup-drill
      - failover-drill
      - load-smoke
      - proto
      - web
      - dependency-scan
      - build-images
    steps:
      - name: Assert every verification gate is green
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          printf '%s' "$NEEDS_JSON" > verify-all-summary.json
          python3 - <<'PY'
          import json
          d = json.load(open("verify-all-summary.json"))
          bad = sorted(k for k, v in d.items() if v.get("result") != "success")
          print(f"verification gates: {len(d)}; failed/skipped: {bad or 'none'}")
          if bad:
              print("::error::verify-all is RED — non-green gates: " + ", ".join(bad))
              raise SystemExit(1)
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: verify-all-receipt
          path: verify-all-summary.json
          retention-days: 90
