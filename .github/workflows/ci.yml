name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  PYTHON_VERSION: "3.12"

jobs:
  lint-go:
    name: lint-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install pinned tools (golangci-lint)
        run: |
          make tools
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: gofmt + go vet + golangci-lint
        run: make lint-go

  lint-python:
    name: lint-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff black
      - name: ruff + black --check
        run: make lint-python

  test-go:
    name: test-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Unit tests (all workspace modules)
        run: make test

  test-python:
    name: test-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e './analyzer[dev]'
      - run: make test-python

  cross-tenant-isolation:
    name: cross-tenant-isolation
    # Permanent CI gate — CLAUDE.md §7 guardrail 1. From S2 this proves real
    # tenant isolation (RLS + tenancy choke point) against a Postgres service.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: netctl
          POSTGRES_PASSWORD: netctl
          POSTGRES_DB: netctl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netctl -d netctl"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NETCTL_DATABASE_URL: postgres://netctl:netctl@localhost:5432/netctl?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Cross-tenant isolation tests
        run: make test-isolation

  integration:
    name: integration
    # Boots the control plane against a real Postgres and asserts migrations are
    # idempotent and /readyz passes (S1 Done-when). Uses a service container
    # rather than the full compose stack — only Postgres is needed yet.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: netctl
          POSTGRES_PASSWORD: netctl
          POSTGRES_DB: netctl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netctl -d netctl"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NETCTL_DATABASE_URL: postgres://netctl:netctl@localhost:5432/netctl?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Integration tests (migrations + readiness)
        run: make test-integration

  dependency-scan:
    name: dependency-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: govulncheck (Go dependencies)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: Trivy filesystem scan (vulns + secrets)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  build-images:
    name: build-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - netctl-control
          - netctl-agent
          - netctl-ebpf-agent
          - netctl-endpoint
          - netctl
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build multi-arch image (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            COMPONENT=${{ matrix.component }}
          push: false
          tags: netctl/${{ matrix.component }}:ci

  image-scan:
    name: image-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build a local amd64 image to scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          build-args: |
            COMPONENT=netctl-control
          load: true
          tags: netctl/netctl-control:scan
      - name: Trivy image scan (vulns + secrets)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: netctl/netctl-control:scan
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  commitlint:
    name: commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs
