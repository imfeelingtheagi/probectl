name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  PYTHON_VERSION: "3.12"

jobs:
  action-pins:
    name: action-pins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Every workflow action is SHA-pinned (U-007)
        run: ./scripts/check_action_pins.sh

  lint-go:
    name: lint-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install pinned tools (golangci-lint)
        run: |
          make tools
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: gofmt + go vet + golangci-lint
        run: make lint-go

  lint-python:
    name: lint-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff black
      - name: ruff + black --check
        run: make lint-python

  editions-gate:
    name: editions-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Editions guard (self-tested) + core-only build/test
        run: make editions-gate

  fips-gate:
    name: fips-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: FIPS artifact builds + power-on self-test (validated module active)
        run: make build-fips fips-gate

  test-go:
    name: test-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Unit tests (all workspace modules)
        run: make test
      - name: Fuzz smoke (untrusted-input parsers must not crash)
        run: make fuzz-smoke
      - name: Cross-compile (linux amd64 + arm64)
        run: make build-cross
      - name: Endpoint agent cross-OS build (Linux/macOS/Windows)
        run: make endpoint-build

  coverage:
    name: coverage
    # Per-package statement-coverage floor on the service-free logic / parser /
    # probe packages (scripts/check_coverage.sh). Stateful DB/transport packages
    # are gated for correctness by the integration + cross-tenant-isolation jobs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Coverage gate
        run: make cover-gate

  test-python:
    name: test-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e './analyzer[dev]'
      - run: make test-python

  browser-worker:
    name: browser-worker
    # S36, F15: the Playwright browser-synthetic worker. Runs INSIDE the official
    # Playwright image (Chromium + deps preinstalled), so the smoke test exercises a
    # real scripted login against a local app — success timings/waterfall/DOM and a
    # failure screenshot. The Go side (internal/browser) is covered by the unit job.
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.55.1-noble
    defaults:
      run:
        working-directory: browser-worker
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: install deps (lockfile-faithful, U-029)
        run: npm ci --no-audit --no-fund
      - name: syntax check
        run: npm run check
      - name: real-browser smoke (scripted login vs a local app)
        run: npm test

  openapi-gate:
    name: openapi-gate
    # S19, F23: no undocumented routes ship at a GA milestone. Validates the spec
    # is OpenAPI 3.1 and that the registered /v1 routes exactly match the spec.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: OpenAPI completeness gate
        run: make openapi-gate

  migration-gate:
    name: migration-gate
    # S34, F28: zero-downtime upgrades require additive (expand/contract) migrations
    # — release N's schema must work with N-1's code (rollback) and N's code. Rejects
    # destructive/blocking changes (drop column, type change, rename, NOT NULL adds).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Migration expand/contract gate
        run: make migration-gate

  helm-gate:
    name: helm-gate
    # S19 + S35, F29: the shipped Helm chart lints for every reference profile and
    # upholds the secure-by-default hardening invariants (non-root/read-only pod,
    # NetworkPolicy/PDB/HPA, /readyz drain probe, HSTS, no default credentials).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.2
      - name: helm lint + hardening gate (small/medium/large/multitenant)
        run: make helm-gate
      - name: GitOps manifests valid (ArgoCD + Flux)
        run: |
          python3 -m pip install --quiet pyyaml
          make gitops-gate
      - name: compose config is valid
        run: docker compose -f deploy/compose/probectl.yml config >/dev/null

  terraform-gate:
    name: terraform-gate
    # S35, F29: the probectl Terraform module is fmt-clean and validates (fmt +
    # `terraform validate` of the example root that consumes it).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.9.8
      - name: terraform fmt + validate
        run: make terraform-gate

  ebpf-kernel-matrix:
    name: ebpf-kernel-matrix (${{ matrix.kernel }})
    # U-021: the BPF programs are LOADED and ATTACHED on real LTS kernels —
    # not just statically checked. vimto boots each kernel under QEMU (KVM is
    # available on GitHub runners) with the runner rootfs, and `go test -exec`
    # runs the live smoke (load, attach tracepoint + uprobes, one agent flush
    # cycle; the U-014 digest verification runs inherently). Kernel images are
    # digest-pinned; the runner-side build is the same bpf2go path operators
    # use (make ebpf-agent). The observe-only static gate runs in test-go.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel: "5.15"
            image: ghcr.io/cilium/ci-kernels:5.15@sha256:11bbf6ada68fdd8850c020b955b84bc16ed6227cdbadbb437da83db6eb02a9d0
          - kernel: "6.6"
            image: ghcr.io/cilium/ci-kernels:6.6@sha256:0b7036c12c2a357672a81e7ff7bf02cc67fe06acb2c4b0206e2a15949d2193bd
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Toolchain (clang + bpftool + qemu)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q clang llvm libbpf-dev linux-tools-common linux-tools-generic qemu-system-x86
      - name: Generate + compile the BPF objects (the operator build path)
        run: |
          set -euo pipefail
          go get github.com/cilium/ebpf
          bpftool btf dump file /sys/kernel/btf/vmlinux format c > internal/ebpf/bpf/vmlinux.h
          (cd internal/ebpf && go run github.com/cilium/ebpf/cmd/bpf2go -cc clang -target bpfel -tags ebpf l4flow ./bpf/l4flow.bpf.c -- -I./bpf)
          (cd internal/ebpf && go run github.com/cilium/ebpf/cmd/bpf2go -cc clang -target bpfel -tags ebpf sslsniff ./bpf/sslsniff.bpf.c -- -I./bpf)
          (cd internal/ebpf && go run ./gendigests .)   # U-014 manifest
      - name: Cache kernel image
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4 (same pin trivy-action uses)
        with:
          path: ~/.cache/vimto
          key: vimto-kernel-${{ matrix.kernel }}
      - name: Load + attach on the ${{ matrix.kernel }} kernel (QEMU)
        run: |
          set -euo pipefail
          go install lmb.io/vimto@v0.4.0
          sudo chmod 0666 /dev/kvm || true
          go test -tags ebpf -exec "$(go env GOPATH)/bin/vimto -kernel ${{ matrix.image }} --"             -run 'TestLive' -count=1 -v ./internal/ebpf/

  cross-tenant-isolation:
    name: cross-tenant-isolation
    # Permanent CI gate — CLAUDE.md §7 guardrail 1. From S2 this proves real
    # tenant isolation (RLS + tenancy choke point) against a Postgres service;
    # U-026 extends the SAME gate to real ClickHouse (flowstore + pathstore
    # cross-tenant reads, scoped erasure, and the row-policy DDL).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: probectl
          POSTGRES_PASSWORD: probectl
          POSTGRES_DB: probectl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U probectl -d probectl"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:24.8@sha256:1ffa82edee000a42c09313bd9f1293d94c570aee74babc1b3ca9983a35fa597b # digest-pinned (U-061)
        ports:
          - 8123:8123
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      PROBECTL_DATABASE_URL: postgres://probectl:probectl@localhost:5432/probectl?sslmode=disable
      PROBECTL_FLOWSTORE_URL: http://localhost:8123
      PROBECTL_PATHSTORE_URL: http://localhost:8123
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Cross-tenant isolation tests
        run: make test-isolation

  integration:
    name: integration
    # Boots the control plane against a real Postgres and asserts migrations are
    # idempotent and /readyz passes (S1 Done-when). Uses a service container
    # rather than the full compose stack — only Postgres is needed yet.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: probectl
          POSTGRES_PASSWORD: probectl
          POSTGRES_DB: probectl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U probectl -d probectl"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PROBECTL_DATABASE_URL: postgres://probectl:probectl@localhost:5432/probectl?sslmode=disable
      # Result pipeline (S6): the TSDB remote-write test targets this Prometheus.
      PROBECTL_PROM_URL: http://localhost:9090
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Start Prometheus with the remote-write receiver (result-pipeline test)
        # A service container cannot take the required --web.enable-remote-write-receiver
        # flag, so run it as a step instead.
        run: |
          docker run -d --name prometheus -p 9090:9090 \
            prom/prometheus:v2.55.1 \
            --config.file=/etc/prometheus/prometheus.yml \
            --web.enable-remote-write-receiver
          for i in $(seq 1 30); do
            curl -fsS http://localhost:9090/-/ready >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "prometheus did not become ready" >&2; docker logs prometheus; exit 1
      - name: Integration tests (migrations + readiness + result pipeline)
        run: make test-integration

  perf-smoke:
    name: perf-smoke
    # S18a perf-foundation: a cheap, repeatable load baseline (a smoke, not a
    # soak). The ingest baseline needs no services; the pooled multi-tenant smoke
    # asserts tenant-scoped isolation + bounded query latency against Postgres —
    # the first place a pooled-cardinality or RLS-cost regression would surface.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: probectl
          POSTGRES_PASSWORD: probectl
          POSTGRES_DB: probectl
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U probectl -d probectl"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PROBECTL_DATABASE_URL: postgres://probectl:probectl@localhost:5432/probectl?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Load/perf smoke (ingest baseline + pooled multi-tenant)
        run: make perf-smoke

  proto:
    name: proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ github.token }}
      - name: buf lint
        run: buf lint
      - name: buf breaking (additive-only vs main — BLOCKING, U-056)
        # The proto schema is the agent/bus wire contract: a breaking change
        # strands deployed agents and replayable bus history. This gate blocks
        # merge; the exception process is in CONTRIBUTING.md (version a new
        # package, never mutate a published one).
        run: buf breaking --against '.git#branch=main'
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install codegen plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Verify generated code is current
        run: |
          buf generate
          git diff --exit-code -- internal/gen \
            || { echo "::error::generated code is stale — run 'make proto' and commit"; exit 1; }

  web:
    name: web
    # Frontend foundation (S8a): typecheck, lint, the a11y + theme-swap + token
    # guards, and a production build. The test step IS the CI a11y gate.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Audit gate (U-028 — no critical advisories)
        run: npm audit --audit-level=critical
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Frontend-coverage gate (S-FE6 — every capability has its declared surface)
        run: npm run coverage-gate
      - name: Test (a11y gate · theme-swap · command palette · no hardcoded tokens)
        run: npm run test
      - name: Build
        run: npm run build

  dependency-scan:
    name: dependency-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: govulncheck (Go dependencies)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: Trivy filesystem scan (vulns + secrets)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  build-images:
    name: build-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - probectl-control
          - probectl-agent
          - probectl-ebpf-agent
          - probectl-endpoint
          - probectl
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build multi-arch image (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            COMPONENT=${{ matrix.component }}
          push: false
          tags: probectl/${{ matrix.component }}:ci

  image-scan:
    name: image-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build a local amd64 image to scan
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          build-args: |
            COMPONENT=probectl-control
          load: true
          tags: probectl/probectl-control:scan
      - name: Trivy image scan (vulns + secrets)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: probectl/probectl-control:scan
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  commitlint:
    name: commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6
        with:
          configFile: commitlint.config.mjs
