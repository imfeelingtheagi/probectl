name: release

# Cut a release by pushing a semver tag: `git tag -a v0.1.0 -m "Phase 1 GA" &&
# git push origin v0.1.0`. This builds + publishes multi-arch images (with SLSA
# provenance + SBOM attestations), cross-compiled binaries + SHA-256 checksums,
# and a GitHub release. See docs/releasing.md.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release
  packages: write # push images to GHCR
  id-token: write # SLSA provenance / keyless attestation
  actions: read # require-green-ci reads the ci workflow's runs (U-083)

env:
  GO_VERSION: "1.26.4"
  IMAGE_PREFIX: ghcr.io/imfeelingtheagi

jobs:
  # U-022/U-083: a tag ships nothing unless the FULL ci workflow concluded
  # green on the exact tagged commit. Tag pushes don't trigger ci, so this
  # gate looks up (and, if still running, waits for) the ci run for
  # github.sha — a tag on an untested/red commit fails here and no artifact
  # is built. Branch protection on main is the second layer (docs/ops/
  # branch-protection.md); this gate holds even for tags cut off-branch.
  require-green-ci:
    name: require green ci on the tagged sha
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: ci workflow must be green for ${{ github.sha }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "tag ${GITHUB_REF_NAME} -> commit ${GITHUB_SHA}"
          for attempt in $(seq 1 60); do # up to ~30 minutes for an in-flight run
            run="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&per_page=1" \
              --jq '.workflow_runs[0] | if . == null then "none none" else "\(.status) \(.conclusion)" end')"
            read -r status conclusion <<<"${run}"
            case "${status}/${conclusion}" in
              completed/success)
                echo "ci is green on ${GITHUB_SHA}"; exit 0 ;;
              completed/*)
                echo "::error::ci concluded '${conclusion}' on ${GITHUB_SHA} — refusing to release an untested/red commit (U-083)."; exit 1 ;;
              none/*)
                echo "::error::no ci run exists for ${GITHUB_SHA}. Tag a commit that ran ci (push it to main first)."; exit 1 ;;
              *)
                echo "ci run is '${status}' (attempt ${attempt}/60); waiting 30s..."; sleep 30 ;;
            esac
          done
          echo "::error::timed out waiting for ci to complete on ${GITHUB_SHA}."
          exit 1

  # TEST-011: the docs-vs-CI contradiction (docs/releasing.md says "all seven"
  # while release.yml shipped five) recurs the moment the Makefile grows a
  # binary that nobody adds here. This gate makes the published set and the
  # Makefile's BINARIES list prove each other equal — drift fails the release
  # instead of silently shipping an incomplete set.
  components-match-makefile:
    name: published components == Makefile BINARIES
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Assert every Makefile binary is a published component
        run: |
          set -euo pipefail
          expected="$(grep -E '^BINARIES[[:space:]]*:=' Makefile | cut -d= -f2- | tr ' ' '\n' | grep . | sort -u)"
          # The full set this workflow publishes: the images matrix plus the
          # ebpf-agent include (its own live-build Dockerfile). Keep in lockstep
          # with the matrix above — this list is the single assertion point.
          published="$(printf '%s\n' \
            probectl-control probectl-agent probectl-endpoint \
            probectl-flow-agent probectl-device-agent probectl \
            probectl-ebpf-agent | sort -u)"
          if ! diff <(echo "$expected") <(echo "$published"); then
            echo "::error::release.yml published components drift from Makefile BINARIES (TEST-011): the < line is in the Makefile but unpublished, the > line is published but not a Makefile binary. Update the images matrix."
            exit 1
          fi
          echo "all $(echo "$expected" | wc -l | tr -d ' ') Makefile binaries are published"

  images:
    name: images (${{ matrix.component }})
    needs: [require-green-ci, components-match-makefile]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        # ALL 7 of the Makefile's BINARIES ship as images + signed downloads —
        # every documented producer is installable without a Go toolchain.
        # (probectl-ebpf-agent rides its special live-build Dockerfile below.)
        component:
          - probectl-control
          - probectl-agent
          - probectl-endpoint
          - probectl-flow-agent
          - probectl-device-agent
          - probectl
        dockerfile: [deploy/docker/Dockerfile]
        include:
          # EBPF-004: the SHIPPED ebpf-agent image is the LIVE (-tags ebpf)
          # build — the generic Dockerfile would ship the fixture-only
          # replayer (dev/test mode). ci.yml's ebpf-image-live job asserts
          # the binary records the tag.
          - component: probectl-ebpf-agent
            dockerfile: deploy/docker/Dockerfile.ebpf
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build + push multi-arch image (with provenance + SBOM)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            COMPONENT=${{ matrix.component }}
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

  binaries:
    name: binaries + checksums + release
    needs: require-green-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Cross-compile release binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          for arch in amd64 arm64; do
            for b in probectl-control probectl-agent probectl-ebpf-agent probectl-endpoint probectl-flow-agent probectl-device-agent probectl; do
              out="dist/${b}_${VERSION}_linux_${arch}"
              GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath \
                -ldflags "-s -w \
                  -X github.com/imfeelingtheagi/probectl/internal/version.Version=${VERSION} \
                  -X github.com/imfeelingtheagi/probectl/internal/version.Commit=${GITHUB_SHA} \
                  -X github.com/imfeelingtheagi/probectl/internal/version.Date=${DATE}" \
                -o "${out}" "./cmd/${b}"
            done
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist
      # U-068: publish the SBOM as a real release artifact (SPDX JSON via
      # syft over the source tree + go.mod/lockfiles). It is written into
      # dist/ BEFORE the signing loop below, so it ships signed and
      # self-verified like every other artifact. The container images carry
      # their own buildx-attested SBOMs (see the images job).
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@8e94d75ddd33f69f691467e42275782e4bfefe84 # v0.20.9
        with:
          path: .
          format: spdx-json
          output-file: dist/probectl_${{ github.ref_name }}_sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false # released via the dist/* glob, signed
      # U-006: keyless (Sigstore/Fulcio) signatures over every released binary
      # and the checksum manifest. The OIDC identity baked into each .pem is
      # THIS repository's release workflow — verifiers pin it (see
      # docs/ops/verify-artifacts.md). id-token: write is already granted.
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2
      - name: Sign artifacts (cosign keyless)
        run: |
          set -euo pipefail
          cd dist
          for f in *; do
            case "$f" in *.sig|*.pem) continue;; esac
            cosign sign-blob --yes               --output-signature "${f}.sig"               --output-certificate "${f}.pem"               "$f"
          done
      - name: Verify own signatures (the gate proves the release is verifiable)
        run: |
          set -euo pipefail
          cd dist
          for f in *; do
            case "$f" in *.sig|*.pem) continue;; esac
            cosign verify-blob               --certificate "${f}.pem"               --signature "${f}.sig"               --certificate-oidc-issuer "https://token.actions.githubusercontent.com"               --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\.github/workflows/release\.yml@refs/tags/"               "$f"
          done
          echo "all artifacts verify"
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/*

  publish-chart:
    name: publish helm chart (OCI)
    # OPS-001: a chart that lags the app version is the
    # 0.1.0-chart-deploys-a-control-plane-that-refuses-v0.4.0-agents trap. Assert
    # the chart's appVersion matches the release tag before publishing, and push
    # the chart as an OCI artifact to GHCR alongside the images.
    needs: require-green-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: appVersion must match the release tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          appv="$(grep -E '^appVersion:' deploy/helm/probectl/Chart.yaml | awk '{print $2}' | tr -d '"')"
          if [ "$appv" != "$tag" ]; then
            echo "::error::Chart.yaml appVersion ($appv) != release tag ($tag) — bump the chart before tagging (OPS-001)."
            exit 1
          fi
          echo "chart appVersion matches tag $tag"
      - name: Helm login + push (OCI to GHCR)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package deploy/helm/probectl --version "${GITHUB_REF_NAME#v}"
          helm push "probectl-${GITHUB_REF_NAME#v}.tgz" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts"

  packages:
    name: deb/rpm packages (${{ matrix.agent }})
    # OPS-004: build a signed deb + rpm per agent type via nfpm and attach them
    # to the release. The binaries job produces the cross-compiled static
    # binaries this consumes; the signed apt/yum repo publish is a follow-on
    # step against the org's package repositories.
    needs: [require-green-ci, binaries]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    strategy:
      matrix:
        agent: [agent, ebpf-agent, flow-agent, device-agent, endpoint]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.0
      - name: Fetch release binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            --pattern "probectl-${{ matrix.agent }}_${GITHUB_REF_NAME}_linux_${{ matrix.arch }}" --dir dist
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Build deb + rpm
        env:
          AGENT: ${{ matrix.agent }}
          ARCH: ${{ matrix.arch }}
          FILE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # OPS-002: FILE_TAG (v-prefixed) matches the binary on disk
          # (probectl-<agent>_v0.2.0_linux_<arch>); PKG_VERSION (numeric) is the
          # deb/rpm package version. Conflating the two broke every package build.
          PKG_VERSION="${FILE_TAG#v}"
          export AGENT ARCH FILE_TAG PKG_VERSION
          # OPS-002: nfpm does NOT expand ${VAR} in contents.src, so render the
          # config with envsubst first (scoped to our 4 vars so no stray $ is
          # touched). Without this, nfpm globbed a literal '${AGENT}' path and
          # built nothing.
          rendered="$(mktemp)"
          envsubst '${AGENT} ${ARCH} ${FILE_TAG} ${PKG_VERSION}' \
            < deploy/packaging/nfpm.yaml > "$rendered"
          for pkg in deb rpm; do
            nfpm package -f "$rendered" -p "$pkg" -t dist/
          done
      - name: Sign packages (cosign keyless)
        run: |
          set -euo pipefail
          cd dist
          for f in *.deb *.rpm; do
            [ -e "$f" ] || continue
            cosign sign-blob --yes --output-signature "${f}.sig" --output-certificate "${f}.pem" "$f"
          done
      - name: Verify own package signatures (SUPPLY-004 — mirror the binaries gate)
        run: |
          set -euo pipefail
          cd dist
          for f in *.deb *.rpm; do
            [ -e "$f" ] || continue
            cosign verify-blob \
              --certificate "${f}.pem" \
              --signature "${f}.sig" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\.github/workflows/release\.yml@refs/tags/" \
              "$f"
          done
          echo "all packages verify"
      - name: Attach to the release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.sig
            dist/*.pem
