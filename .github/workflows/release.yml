name: release

# Cut a release by pushing a semver tag: `git tag -a v0.1.0 -m "Phase 1 GA" &&
# git push origin v0.1.0`. This builds + publishes multi-arch images (with SLSA
# provenance + SBOM attestations), cross-compiled binaries + SHA-256 checksums,
# and a GitHub release. See docs/releasing.md.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release
  packages: write # push images to GHCR
  id-token: write # SLSA provenance / keyless attestation

env:
  GO_VERSION: "1.26"
  IMAGE_PREFIX: ghcr.io/imfeelingtheagi

jobs:
  images:
    name: images (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - netctl-control
          - netctl-agent
          - netctl-ebpf-agent
          - netctl-endpoint
          - netctl
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build + push multi-arch image (with provenance + SBOM)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            COMPONENT=${{ matrix.component }}
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

  binaries:
    name: binaries + checksums + release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Cross-compile release binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          for arch in amd64 arm64; do
            for b in netctl-control netctl-agent netctl-ebpf-agent netctl-endpoint netctl; do
              out="dist/${b}_${VERSION}_linux_${arch}"
              GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath \
                -ldflags "-s -w \
                  -X github.com/imfeelingtheagi/netctl/internal/version.Version=${VERSION} \
                  -X github.com/imfeelingtheagi/netctl/internal/version.Commit=${GITHUB_SHA} \
                  -X github.com/imfeelingtheagi/netctl/internal/version.Date=${DATE}" \
                -o "${out}" "./cmd/${b}"
            done
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -la dist
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
