name: nightly

# U-054: the BLACK-BOX full-stack e2e (test/e2e) — real binaries, the real
# compose dependencies, public interfaces only: enroll two fixture-mode
# agents, ingest over Kafka, query /v1/topology per tenant, assert the
# tenancy boundary both ways. Nightly (not per-PR): it boots a stack and
# takes minutes; per-PR full-stack correctness stays with the integration +
# cross-tenant-isolation jobs.

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: e2e (black-box full stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: full-stack e2e (compose → binaries → ingest → API → tenancy)
        run: make e2e
