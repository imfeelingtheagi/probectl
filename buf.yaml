# buf configuration for probectl's protobuf sources (gRPC services + bus messages).
#
# Schemas live under proto/probectl/<plane>/v1 (agent, result, bgp, ebpf, flow,
# device, prometheus) plus the vendored gnmi/gnmi_ext below. `make proto`
# regenerates Go into internal/gen (see buf.gen.yaml); CI's proto job runs
# `buf breaking` so published schemas are append-only. Protobuf is the wire
# format for the bus and gRPC; JSON is a dev-only fallback.
version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  ignore:
    # Vendored upstream schemas kept byte-wire-compatible (package names,
    # field numbers, enums as published) so probectl interoperates with the
    # real ecosystem; upstream style predates buf's STANDARD rules.
    # gnmi/gnmi_ext: openconfig/gnmi (S39 device telemetry).
    - proto/gnmi
    - proto/gnmi_ext
breaking:
  use:
    - FILE
