syntax = "proto3";

// eBPF host/L4 signals (S20). Flow is one observed L3/L4 connection event from
// the CO-RE eBPF agent; ServiceEdge is the directed, userspace-aggregated unit
// of the service map. Field names follow OpenTelemetry resource + network
// semantic conventions from the first field (matching result.proto / S6), so
// the OTLP layer (S22) EXPOSES these signals rather than remapping them. The
// tenant is the outermost scope (netctl.tenant.id, F50). eBPF is observe-only
// (CLAUDE.md §7 guardrail 8): these are signals, never enforcement.
//
// Backward compatibility: fields are additive-only; never renumber or reuse tags.
package netctl.ebpf.v1;

option go_package = "github.com/imfeelingtheagi/netctl/internal/gen/netctl/ebpf/v1;ebpfv1";

message Flow {
  // --- Resource identity (OTel resource attributes) ---
  string tenant_id = 1; // -> "netctl.tenant.id" (outermost scope, F50)
  string agent_id = 2;  // -> "netctl.agent.id"
  string host = 3;      // -> "host.name" (the observing host)

  int64 observed_at_unix_nano = 4; // OTel-style nanosecond timestamp

  // --- 5-tuple (OTel source.* / destination.* / network.* conventions) ---
  string source_address = 5;      // -> "source.address"
  uint32 source_port = 6;         // -> "source.port"
  string destination_address = 7; // -> "destination.address"
  uint32 destination_port = 8;    // -> "destination.port"
  string network_transport = 9;   // -> "network.transport" (tcp | udp)
  string network_type = 10;       // -> "network.type" (ipv4 | ipv6)

  // --- Workload / process context (enrichment; CNI-agnostic) ---
  uint32 pid = 11;
  string process_name = 12; // -> "process.executable.name"
  string container_id = 13; // -> "container.id"
  string workload = 14;     // resolved service/workload name (k8s pod, systemd unit, ...)

  // --- Observe-only counters + classification ---
  uint64 bytes = 15;
  uint64 packets = 16;
  string direction = 17; // -> "network.io.direction" (ingress | egress)
  string state = 18;     // tcp state that produced the event (established | close)
}

message ServiceEdge {
  string tenant_id = 1;
  string source = 2;            // source workload/endpoint id
  string destination = 3;       // destination workload/endpoint id
  uint32 destination_port = 4;  // -> "destination.port"
  string network_transport = 5; // -> "network.transport"
  uint64 connections = 6;
  uint64 bytes = 7;
  uint64 packets = 8;
  int64 first_seen_unix_nano = 9;
  int64 last_seen_unix_nano = 10;

  // L7 rollup (S21): protocol + call/error counts + latency sum/max for the edge.
  string l7_protocol = 11;
  uint64 l7_calls = 12;
  uint64 l7_errors = 13;
  int64 l7_latency_sum_nano = 14;
  int64 l7_latency_max_nano = 15;
}

// L7Call is one application-protocol call observed by the eBPF agent (S21),
// parsed from plaintext — captured before encryption via TLS-library uprobes or
// directly from sockets. Field names follow OTel http.* / rpc.* / db.*
// conventions where they exist (see internal/otel).
message L7Call {
  string tenant_id = 1;
  string agent_id = 2;

  // Which service edge this call belongs to.
  string source = 3;
  string destination = 4;
  uint32 destination_port = 5;

  string protocol = 6; // http1 | http2 | grpc | dns | kafka
  string method = 7;   // HTTP method | gRPC full-method | DNS qtype | Kafka API name
  string resource = 8; // HTTP path | gRPC service/method | DNS qname | Kafka topic
  string status = 9;   // HTTP status | grpc-status | DNS rcode | Kafka error code
  bool error = 10;     // status denotes an error
  bool encrypted = 11; // captured via TLS uprobe (plaintext-before-encryption)

  int64 start_unix_nano = 12;
  int64 latency_nano = 13;
  uint64 request_bytes = 14;
  uint64 response_bytes = 15;
}

// FlowBatch is the payload published to netctl.ebpf.flows (tenant-keyed).
message FlowBatch {
  repeated Flow flows = 1;
  repeated ServiceEdge edges = 2;
  repeated L7Call l7_calls = 3;
}
